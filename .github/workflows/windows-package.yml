name: windows-package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  unsigned-installers:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @openfamiliar/desktop tauri build
      - name: Hash installers
        shell: pwsh
        run: |
          Get-ChildItem target/release/bundle -Recurse -File -Include *.msi,*.exe |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash, $_.Path } |
            Set-Content -Encoding utf8 target/release/bundle/SHA256SUMS.txt
      - name: Attest Windows installers
        if: github.event.repository.visibility == 'public'
        uses: actions/attest@v4
        with:
          subject-path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
      - uses: actions/upload-artifact@v4
        with:
          name: openfamiliar-windows-unsigned-${{ github.sha }}
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/SHA256SUMS.txt
          if-no-files-found: error
